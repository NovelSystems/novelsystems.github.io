capabilities:
  - heading: "Detects"
    body: "Persons in water at 3-5km range under sea states up to Beaufort 4 (design targets pending Phase I validation)"
  - heading: "Classifies"
    body: "Biological targets against rough sea surface without operator interpretation"
  - heading: "Discriminates"
    body: "Maintains classification through rain, spray, and partial submersion"
