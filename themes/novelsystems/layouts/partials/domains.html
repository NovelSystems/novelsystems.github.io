<section class="domains section" aria-labelledby="domains-heading">
  <div class="container">
    <div class="domains__header">
      <span class="label">Licensing Domains</span>
      <h2 id="domains-heading">Three addressable markets, one measurement</h2>
    </div>
    <div class="domains__grid">
      {{ range .Site.Data.domains.domains }}
      <div class="domain-card">
        <span class="domain-card__label">{{ .label }}</span>
        <h3>{{ .heading }}</h3>
        <p>{{ .body }}</p>
        <a href="{{ .link }}" class="domain-card__link">Learn more</a>
      </div>
      {{ end }}
    </div>
  </div>
</section>
