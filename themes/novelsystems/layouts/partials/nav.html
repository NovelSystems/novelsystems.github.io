<nav class="site-nav" aria-label="Primary navigation">
  <div class="container">
    <a href="/" class="site-logo">
      <img src="/img/banner.png" alt="Novel Systems Engineering" style="height: 60px; width: auto;">
    </a>
    <ul class="nav-links" role="list">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a>
      </li>
      {{ end }}
    </ul>
    <button class="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-mobile">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
<div class="nav-mobile" id="nav-mobile" role="dialog" aria-label="Mobile navigation">
  <ul role="list">
    {{ range .Site.Menus.main }}
    <li>
      <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a>
    </li>
    {{ end }}
  </ul>
</div>
