{{ define "main" }}
<div class="page-hero">
  <div class="container">
    <h1>{{ .Title }}</h1>
  </div>
</div>
<div class="page-content">
  <div class="container">
    {{ range .Pages }}
    <div style="padding: 1.5rem 0; border-bottom: 1px solid var(--border);">
      <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      {{ with .Params.summary }}<p style="color: var(--text-mid);">{{ . }}</p>{{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
